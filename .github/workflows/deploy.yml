name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_PRODUCTION_LOOT_LOG_API_URL: https://maeljnrgffgrljqusnre.supabase.co/functions/v1/loot-logs

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-api:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Supabase credentials not configured
        if: ${{ env.SUPABASE_ACCESS_TOKEN == '' || env.SUPABASE_SERVICE_ROLE_KEY == '' }}
        run: echo "Skipping API deployment until Supabase repository secrets are configured."

      - name: Checkout
        if: ${{ env.SUPABASE_ACCESS_TOKEN != '' && env.SUPABASE_SERVICE_ROLE_KEY != '' }}
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        if: ${{ env.SUPABASE_ACCESS_TOKEN != '' && env.SUPABASE_SERVICE_ROLE_KEY != '' }}
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Configure loot log API secrets
        if: ${{ env.SUPABASE_ACCESS_TOKEN != '' && env.SUPABASE_SERVICE_ROLE_KEY != '' }}
        run: supabase secrets set SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY" --project-ref maeljnrgffgrljqusnre

      - name: Deploy loot log API
        if: ${{ env.SUPABASE_ACCESS_TOKEN != '' && env.SUPABASE_SERVICE_ROLE_KEY != '' }}
        run: supabase functions deploy loot-logs --no-verify-jwt --project-ref maeljnrgffgrljqusnre

      - name: Deploy action log API
        if: ${{ env.SUPABASE_ACCESS_TOKEN != '' && env.SUPABASE_SERVICE_ROLE_KEY != '' }}
        run: supabase functions deploy action-logs --no-verify-jwt --project-ref maeljnrgffgrljqusnre
